<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyWebViewApp</title>
  <style>
    /* ── フォント ─────────────────────────────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap');

    /* ── CSS 変数 ─────────────────────────────────────── */
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --radius:    12px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── 背景グリッド ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── ヘッダー ─────────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: rgba(22,27,34,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent2); }

    nav { display: flex; gap: 24px; }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }

    /* ── メインコンテンツ ─────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      gap: 48px;
    }

    /* ── ヒーロー ─────────────────────────────────────── */
    .hero {
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ── カードグリッド ───────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: default;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── カウンターデモ ───────────────────────────────── */
    .demo-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 48px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .demo-box h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 64px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 24px;
      transition: transform 0.1s;
    }

    .counter.bump { transform: scale(1.15); }

    .btn-row { display: flex; gap: 12px; justify-content: center; }

    button {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover { background: rgba(88,166,255,0.1); border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }
    button.primary:hover { background: #79b8ff; }

    /* ── メッセージングデモ ─────────────────────────────── */
    .messaging-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 48px;
      text-align: center;
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.8s 0.6s ease both;
      margin-top: 20px;
    }

    .messaging-box h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    .response-area {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      min-height: 60px;
      border: 1px dashed var(--border);
      color: var(--accent2);
      word-break: break-all;
    }

    /* ── フッター ─────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── アニメーション ───────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <div class="logo">My<span>WebView</span>App</div>
    <nav>
      <a href="#" onclick="reload()">リロード</a>
    </nav>
  </header>

  <!-- メイン -->
  <main>

    <!-- ヒーロー -->
    <section class="hero">
      <div class="hero-eyebrow">C++ / LLVM Clang / WebView2</div>
      <h1>JS ⇒ C++ Send , Example<br/></h1>
    </section>

    <!-- メッセージングデモ -->
    <div class="messaging-box">
      <h2>C++ 相互通信デモ</h2>
      <div class="input-group">
        <input type="text" id="msgInput" placeholder="C++ に送る文字を入力..." />
        <button class="primary" onclick="sendMessage()">送信</button>
      </div>
      <div class="response-area" id="responseArea">
        C++ からの返信がここに表示されます。
      </div>
    </div>

  </main>

  <!-- フッター -->
  <footer>
    Built with C++ · LLVM Clang · Microsoft WebView2 &nbsp;|&nbsp; html/index.html
  </footer>

  <script>
    // ── カウンター ─────────────────────────────────────
    let n = 0;
    const el = document.getElementById('count');

    function change(delta) {
      n += delta;
      el.textContent = n;
      el.classList.remove('bump');
      void el.offsetWidth;          // reflow で再トリガー
      el.classList.add('bump');
      el.style.color = n > 0 ? 'var(--accent2)' : n < 0 ? '#f85149' : 'var(--accent)';
    }

    function reset() {
      n = 0;
      el.textContent = 0;
      el.style.color = 'var(--accent)';
    }

    // ── C++ 側への橋渡し ──────────────────────────────
    function reload()    { location.reload(); }
    function openDevTools() {
      // DevTools は F12 または C++側の OpenDevToolsWindow() で開く
    }

    // JS -> C++ 送信
    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value;
      if (text && window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(text);
        input.value = '';
      }
    }

    // C++ -> JS 受信
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', event => {
        const responseArea = document.getElementById('responseArea');
        responseArea.textContent = event.data;
        
        // 視覚的フィードバック
        responseArea.style.borderColor = 'var(--accent2)';
        setTimeout(() => {
          responseArea.style.borderColor = 'var(--border)';
        }, 500);
      });
    }
  </script>
  <script src="../static/client.js"></script>

</body>
</html>
